name: TLS Unload Crash

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Control: glibc keeps the unloaded library mapped (keepalive), so the
  # TLS destructor still has valid code to run at exit -> clean exit 0.
  linux:
    name: Linux (expected PASS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run
        run: |
          mkdir build && cd build
          cmake .. && cmake --build .
          ./main
          echo "main exited with code $?"

  # The lesson: Haiku unmaps the library on dlclose, so the registered TLS
  # destructor points at unmapped code -> SIGSEGV at process exit.
  haiku:
    name: Haiku (expected CRASH at exit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run on Haiku
        uses: cross-platform-actions/action@v1.2.0
        with:
          operating_system: haiku
          version: r1beta5
          architecture: x86-64
          shell: sh
          run: |
            # Make the debug_server report-and-continue instead of stopping to
            # wait for a debugger. 'report' writes a full crash report (stack
            # trace) to disk, which is exactly the concrete evidence we want.
            mkdir -p /boot/home/config/settings/system/debug_server
            printf 'default_action report\n' > /boot/home/config/settings/system/debug_server/settings

            pkgman install -y cmake git

            mkdir build && cd build
            cmake .. && cmake --build .

            # Don't let the crash abort the step before we collect evidence.
            set +e
            echo "===== running ./main ====="
            ./main
            status=$?
            echo "===== ./main exit status: $status ====="
            if [ "$status" -gt 128 ]; then
              echo ">>> CRASHED with signal $((status - 128)) at exit (no keepalive)"
            fi

            # Dump the debug_server crash report(s): the stack trace shows the
            # fault is in the TLS destructor inside the now-unmapped libtlslib.
            echo "===== crash report(s) ====="
            # Copy into the work dir so the action rsyncs them back to the host
            # for artifact upload (only /boot/home/home/runner/work is synced).
            find /boot/home /boot/system/var -name '*-debug-*.report' 2>/dev/null \
              | while read -r f; do
                  echo "---- $f ----"
                  cat "$f"
                  cp "$f" "$PWD/" 2>/dev/null || true
                done
            echo "===== syslog tail (crash entries) ====="
            tail -n 50 /boot/system/var/log/syslog 2>/dev/null | grep -iE 'main|debug|segment|crash|signal' || true

            exit "$status"

      - name: Upload Haiku crash report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: haiku-crash-report
          path: build/*.report
          if-no-files-found: warn
